name: Deploy levac.net to SmarterASP

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: win8135.site4now.net
          username: jd2005l-001
          password: ${{ secrets.LEVAFTP_PASSWORD }}
          local-dir: ./
          server-dir: /
          exclude: |
            .git/**
            .github/**
            .gitignore
