        - heading "Built for Alberta's evolving market" [level=2] [ref=e50]
        - paragraph [ref=e51]: Founded in 2008, AMRIK Developments was created in response to Alberta's evolving and often unpredictable real estate market over the past 18 years. Named in honour of our late grandfather, Amrik Singh, the company strives to reflect the same leadership, credibility, and strength he embodied.
