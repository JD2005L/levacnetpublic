  - generic [ref=e76]:
    - generic [ref=e77]: Why ProVisionI
    - heading "Active Guarding Changes Everything" [level=2] [ref=e78]
    - paragraph [ref=e79]: Most security companies monitor. We guard. The difference is what happens in the critical seconds after a threat is detected.
  - generic [ref=e141]:
    - generic [ref=e142]: The Bottom Line
    - heading "Better Protection. Smarter Investment." [level=2] [ref=e143]:
      - text: Better Protection.
      - text: Smarter Investment.
    - paragraph [ref=e144]: Traditional guards cost $25-40/hour per site. One person, one location, human limitations. And what the industry calls "Active Monitoring" isn't much better. They watch clips in a call center queue, review alerts long after the moment has passed, and file a report for your insurance claim. That's not protection. That's paperwork.
    - paragraph [ref=e145]: Active Guarding is what active actually looks like. AI detects threats in real time. A trained operator is on your feed in seconds, not minutes. 125dB sirens and pre-recorded warnings activate instantly, security is dispatched, and police are coordinated while the incident is still happening.
    - paragraph [ref=e146]: Our clients consistently spend less than they did on traditional security, with better outcomes and complete documentation.
  - generic [ref=e192]:
    - generic [ref=e193]: Industries
    - heading "Protection Across Sectors" [level=2] [ref=e194]
    - paragraph [ref=e195]: From construction sites to shopping plazas, our Active Guarding adapts to the unique security challenges of your industry.
  - generic [ref=e231]:
    - generic [ref=e232]:
      - text: No Power?
      - generic [ref=e233]: No Problem.
    - heading "Off-Grid Guard Towers" [level=2] [ref=e234]:
      - text: Off-Grid
      - text: Guard Towers
    - paragraph [ref=e235]: Remote construction sites. Rural properties. Temporary laydown yards. The places that need security the most are often the places with no power, no internet, and no infrastructure. Until now.
    - paragraph [ref=e236]: Our self-contained guard towers deploy anywhere in hours. Solar-powered, cellular-connected, and loaded with the same AI detection and live operator intervention as our hardwired systems. Full Active Guarding capability without a single wire in the ground.
