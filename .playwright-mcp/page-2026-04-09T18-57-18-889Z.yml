      - generic [ref=e77]: Why ProVisionI
      - heading "Active Guarding Changes Everything" [level=2] [ref=e78]
      - paragraph [ref=e79]: Most security companies monitor. We guard. The difference is what happens in the critical seconds after a threat is detected.
    - generic [ref=e80]:
      - generic [ref=e82]:
        - generic [ref=e84]: 
        - heading "AI-Powered Detection" [level=4] [ref=e85]
        - paragraph [ref=e86]: Advanced algorithms detect threats before they escalate. Human-verified, zero false-alarm fatigue. Our AI sees what cameras alone cannot.
      - generic [ref=e88]:
