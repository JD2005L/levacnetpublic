        - heading "24/7/365 Coverage" [level=4] [ref=e103]
        - paragraph [ref=e104]: Round-the-clock protection that never sleeps, never blinks, never takes a break. Your property is guarded every second of every day.
      - generic [ref=e106]:
        - generic [ref=e108]: 
        - heading "Your Cameras. Your Access." [level=4] [ref=e109]
        - paragraph [ref=e110]: Every client gets a dedicated portal with live feeds accessible from any device. Phone, tablet, or a wall of monitors on-site. We consider this baseline. Most don't even offer it.
      - generic [ref=e112]:
