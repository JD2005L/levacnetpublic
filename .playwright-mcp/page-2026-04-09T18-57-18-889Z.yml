        - heading "Instant Audio Deterrence" [level=4] [ref=e91]
        - paragraph [ref=e92]: 125dB sirens and pre-recorded warnings activate the moment a threat is confirmed. Intruders know immediately they've been detected and recorded.
      - generic [ref=e94]:
        - generic [ref=e96]: 
        - heading "Rapid Dispatch" [level=4] [ref=e97]
        - paragraph [ref=e98]: When deterrence isn't enough, we coordinate directly with law enforcement and security dispatch. Response times measured in seconds, not minutes.
      - generic [ref=e100]:
